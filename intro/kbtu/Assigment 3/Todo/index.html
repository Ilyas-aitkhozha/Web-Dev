<!DOCTYPE html>
<html lang="en">
<head>
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="header">
  <h1>To-Do List</h1>
</header>

<main class="main">
  <form class="todo-form" id="todoForm">
    <label for="todoInput">New task</label>

    <div class="form-row">
      <input id="todoInput" type="text"/>

      <button id="addButton" type="submit">Add</button>
    </div>

    <div class="filters" id="filterGroup">
      <button type="button" class="filter-btn is-active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="active">Active</button>
      <button type="button" class="filter-btn" data-filter="completed">Completed</button>
    </div>
  </form>

  <ul id="todoList" class="todo-list"></ul>
</main>

<script src="script.js"></script>
</body>
</html>
