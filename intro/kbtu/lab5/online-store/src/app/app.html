<div class="hero">
  <div class="overlay">
    <div class="content">
      <h1 class="title">Online Store</h1>
      <div class="categories">
        @for (c of categories; track c.id) {
          <button
            class="cat-btn"
            [class.active]="selectedCategoryId === c.id"
            (click)="selectCategory(c.id)"
          >
            {{ c.name }}
          </button>
        }
      </div>

      @if (selectedCategoryId === null) {
        <p class="hint">Select a category to view products</p>
      } @else {

        <div class="section">
          <h2 class="section-title">⭐ Favorites ({{ favorites.length }})</h2>
          @if (favorites.length === 0) {
            <p class="hint">No favorite products yet</p>
          } @else {
            <app-product-list
              [products]="favorites"
              (deleteProduct)="handleDelete($event)"
              (toggleFavorite)="toggleFavorite($event)"
            ></app-product-list>
          }
        </div>

        <div class="section">
          <h2 class="section-title">Products</h2>
          <app-product-list
            [products]="filteredProducts"
            (deleteProduct)="handleDelete($event)"
            (toggleFavorite)="toggleFavorite($event)"
          ></app-product-list>
        </div>
      }
    </div>
  </div>
</div>
