<h1>Albums</h1>

@if (loading) {
  <div class="info">Loading albums...</div>
}

@if (error) {
  <div class="error">{{ error }}</div>
}

@if (!loading && albums.length === 0) {
  <div class="info">No albums found.</div>
}

@if (!loading && albums.length > 0) {
  <ul class="list">
    @for (a of albums; track a.id) {
      <li class="item" [routerLink]="['/albums', a.id]">
        <div class="text">
          <div class="id">#{{ a.id }}</div>
          <div class="title">{{ a.title }}</div>
        </div>

        <button (click)="deleteAlbum(a.id, $event)">Delete</button>
      </li>
    }
  </ul>
}
