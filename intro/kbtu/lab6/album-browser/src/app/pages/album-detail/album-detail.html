@if (loading()) {
  <p>Loading album...</p>
} @else if (error()) {
  <p class="error">{{ error() }}</p>
} @else if (album()) {
  <h2>Album #{{ album()!.id }}</h2>
  <p>User ID: {{ album()!.userId }}</p>

  <label>
    Title:
    <input [ngModel]="editedTitle()" (ngModelChange)="editedTitle.set($event)" />
  </label>

  <div class="buttons">
    <button (click)="save()">Save</button>

    <a [routerLink]="['/albums', album()!.id, 'photos']">View Photos</a>

    <button (click)="back()">Back</button>
  </div>
}
